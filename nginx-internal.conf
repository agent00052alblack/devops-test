cat << 'EOF' > nginx-internal.conf
events {}

http {
    server {
        listen 80;

        location / {
            # Дописываем текущий прокси в общую цепочку X-Forwarded-For
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            
            # Отправляем на абстрактный следующий узел
            proxy_pass http://next-hop;
        }
    }
}
EOF
